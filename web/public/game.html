<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseHousie - Tambola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-left h1 {
            font-size: 20px;
            color: #667eea;
            margin-bottom: 4px;
        }

        .header-info {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 20px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #764ba2;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .layout {
            display: grid;
            grid-template-columns: 180px 1fr 200px;
            gap: 10px;
        }

        /* Board Panel */
        .board-panel {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            text-align: center;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            margin-bottom: 12px;
        }

        .dot {
            aspect-ratio: 1;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        .dot.drawn {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .drawn-list {
            border-top: 1px solid #eee;
            padding-top: 8px;
            font-size: 11px;
        }

        .drawn-list h4 {
            font-size: 11px;
            margin-bottom: 6px;
            color: #333;
        }

        .drawn-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .drawn-num {
            background: #667eea;
            color: white;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
        }

        /* Tickets Panel */
        .tickets-panel {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .ticket {
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }

        .ticket.mine {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #ddd;
            color: #333;
            font-weight: 600;
        }

        .prize-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .prize-btn {
            font-size: 16px;
            padding: 4px 6px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prize-btn:hover:not(:disabled) {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .prize-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            margin-bottom: 6px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 26px;
        }

        .cell.empty {
            background: #f5f5f5;
            cursor: default;
            border-style: dashed;
        }

        .cell.marked {
            background: #667eea;
            color: white;
            border-color: #667eea;
            font-weight: 700;
        }

        .cell.drawn {
            background: #e8eef9;
            border-color: #667eea;
        }

        .cell.drawn.marked {
            background: #667eea;
            color: white;
        }

        .cell:hover:not(.empty) {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .ticket-info {
            font-size: 10px;
            color: #999;
            text-align: right;
        }

        /* Leaderboard Panel */
        .leaderboard-panel {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .pool-info {
            background: #f0f4ff;
            border: 1px solid #667eea;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
        }

        .pool-label {
            font-size: 11px;
            color: #666;
        }

        .pool-amount {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .winner-card {
            background: #f9f9f9;
            border-left: 3px solid #667eea;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .winner-name {
            font-weight: 600;
            font-size: 12px;
            color: #333;
            margin-bottom: 4px;
        }

        .winner-prizes {
            font-size: 10px;
            color: #666;
            line-height: 1.4;
        }

        .prize-item {
            margin-bottom: 2px;
        }

        .winner-total {
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid #ddd;
            font-weight: 600;
            color: #28a745;
            font-size: 11px;
        }

        .empty-msg {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 20px 0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal h2 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .game-item {
            padding: 10px;
            background: #f9f9f9;
            margin-bottom: 8px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .game-item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .game-item-info {
            font-size: 10px;
            color: #666;
            margin-bottom: 6px;
        }

        .game-item-btn {
            width: 100%;
            padding: 6px;
            font-size: 11px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 4px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 150px 1fr 140px;
                gap: 8px;
            }
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .board-panel, .leaderboard-panel {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🎮 Tambola</h1>
                <div class="header-info">
                    <span>Code: <strong id="code">-</strong></span>
                    <span>Players: <strong id="players">0/5</strong></span>
                    <span id="status-txt"></span>
                </div>
            </div>
            <div class="header-actions">
                <button id="startBtn" class="btn btn-primary" style="display:none">▶️ Start</button>
                <button id="resumeBtn" class="btn btn-primary" style="display:none">⏯️ Resume</button>
                <button id="endBtn" class="btn btn-danger" style="display:none">⏹️ End</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>

        <div class="layout">
            <div class="board-panel">
                <div class="panel-title">🎲 Board</div>
                <div class="board-grid" id="boardGrid"></div>
                <div class="drawn-list">
                    <h4>Last Drawn</h4>
                    <div class="drawn-numbers" id="drawnList"></div>
                </div>
            </div>

            <div class="tickets-panel">
                <div class="panel-title">🎫 Your Tickets</div>
                <div class="tickets-grid" id="ticketsGrid"></div>
            </div>

            <div class="leaderboard-panel">
                <div class="panel-title">🏆 Leaderboard</div>
                <div class="pool-info">
                    <div class="pool-label">Prize Pool</div>
                    <div class="pool-amount">₹<span id="poolAmt">0</span></div>
                </div>
                <div id="leaderboardList"></div>
                <div id="emptyBoard" class="empty-msg">No winners yet</div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="gamesModal" class="modal show">
        <div class="modal-content">
            <h2>🎮 Games</h2>
            <div id="gamesList" style="max-height:400px;overflow-y:auto;margin-bottom:16px"></div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="showCreateModal()">➕ Create</button>
            </div>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2>Create Game</h2>
            <div class="form-group">
                <label>Tickets</label>
                <input type="number" id="createTickets" value="2" min="1" max="6">
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="createPrice" value="100" min="10">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="hideCreateModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createGame()">Create</button>
            </div>
        </div>
    </div>

    <div id="joinModal" class="modal">
        <div class="modal-content">
            <h2>Join Game</h2>
            <div class="form-group">
                <label>Tickets</label>
                <input type="number" id="joinTickets" value="1" min="1" max="6">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="hideJoinModal()">Cancel</button>
                <button class="btn btn-primary" onclick="joinGame()">Join</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            userId: null,
            username: null,
            gameId: null,
            isHost: false,
            game: null,
            ws: null,
            selectedGameId: null
        };

        function init() {
            const userId = localStorage.getItem('userId');
            const username = localStorage.getItem('username');

            if (!userId || !username) {
                window.location.href = '/';
                return;
            }

            state.userId = userId;
            state.username = username;

            loadGames();
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('startBtn').onclick = startGame;
            document.getElementById('resumeBtn').onclick = resumeGame;
            document.getElementById('endBtn').onclick = endGame;
        }

        async function loadGames() {
            try {
                const res = await fetch('/api/games');
                const games = await res.json();

                let html = '';
                if (games.length === 0) {
                    html = '<div class="empty-msg">No active games</div>';
                } else {
                    games.forEach(g => {
                        const count = Object.keys(g.players || {}).length;
                        const joined = g.players && g.players[state.userId];
                        html += `
                            <div class="game-item">
                                <div class="game-item-title">${g.hostName} - ₹${g.ticketPrice}</div>
                                <div class="game-item-info">Code: ${g.joinCode} | Players: ${count}/5 | ${g.status}</div>
                                <button class="btn btn-primary game-item-btn" onclick="selectGame('${g.id}')">
                                    ${joined ? '👁️ View' : '➕ Join'}
                                </button>
                            </div>
                        `;
                    });
                }
                document.getElementById('gamesList').innerHTML = html;
            } catch (e) {
                console.error('Error loading games:', e);
            }
        }

        function showCreateModal() {
            document.getElementById('gamesModal').classList.remove('show');
            document.getElementById('createModal').classList.add('show');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('show');
            document.getElementById('gamesModal').classList.add('show');
        }

        async function createGame() {
            const tickets = parseInt(document.getElementById('createTickets').value);
            const price = parseInt(document.getElementById('createPrice').value);

            try {
                const res = await fetch('/api/games/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: state.userId, username: state.username, ticketCount: tickets, ticketPrice: price })
                });

                const data = await res.json();
                state.gameId = data.game.id;
                state.isHost = true;
                hideCreateModal();
                connectGame();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function selectGame(gameId) {
            state.selectedGameId = gameId;
            document.getElementById('gamesModal').classList.remove('show');
            document.getElementById('joinModal').classList.add('show');
        }

        function hideJoinModal() {
            document.getElementById('joinModal').classList.remove('show');
            document.getElementById('gamesModal').classList.add('show');
        }

        async function joinGame() {
            const tickets = parseInt(document.getElementById('joinTickets').value);

            try {
                const res = await fetch('/api/games/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        gameId: state.selectedGameId,
                        userId: state.userId,
                        username: state.username,
                        ticketCount: tickets
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    alert(err.error);
                    return;
                }

                state.gameId = state.selectedGameId;
                hideJoinModal();
                connectGame();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function connectGame() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            state.ws = new WebSocket(`${proto}//${window.location.host}`);

            state.ws.onopen = () => {
                state.ws.send(JSON.stringify({ type: 'JOIN_GAME', gameId: state.gameId, userId: state.userId }));
            };

            state.ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMsg(msg);
            };

            state.ws.onclose = () => {
                console.log('Disconnected');
            };
        }

        function handleMsg(msg) {
            switch (msg.type) {
                case 'GAME_STATE':
                    state.game = msg.game;
                    render();
                    break;

                case 'GAME_STARTED':
                    state.game = msg.game;
                    render();
                    break;

                case 'NUMBER_DRAWN':
                    state.game.drawnNumbers = msg.drawnNumbers;
                    renderBoard();
                    renderDrawnList();
                    break;

                case 'PRIZE_CLAIMED':
                    state.game.prizes = msg.prizes;
                    state.game.leaderboard = msg.leaderboard || [];
                    state.game.isDrawing = false;
                    render();
                    break;

                case 'DRAWING_RESUMED':
                    state.game.isDrawing = true;
                    render();
                    break;

                case 'GAME_ENDED':
                    setTimeout(() => {
                        localStorage.removeItem('gameId');
                        window.location.href = '/game.html';
                    }, 1000);
                    break;

                case 'NUMBER_MARKED':
                    const p = state.game.players[msg.playerId];
                    if (p) {
                        p.tickets.forEach(t => {
                            if (!t.markedNumbers.includes(msg.number)) {
                                t.markedNumbers.push(msg.number);
                            }
                        });
                    }
                    renderTickets();
                    break;
            }
        }

        function render() {
            const g = state.game;
            if (!g) return;

            document.getElementById('gamesModal').classList.remove('show');

            // Header
            document.getElementById('code').textContent = g.joinCode;
            document.getElementById('players').textContent = `${Object.keys(g.players || {}).length}/5`;
            document.getElementById('status-txt').textContent = `Status: ${g.status}`;

            // Buttons
            const isHost = g.hostId === state.userId;
            document.getElementById('startBtn').style.display = isHost && g.status === 'WAITING' ? 'block' : 'none';
            document.getElementById('endBtn').style.display = isHost && g.status === 'IN_PROGRESS' ? 'block' : 'none';
            document.getElementById('resumeBtn').style.display = isHost && g.status === 'IN_PROGRESS' && !g.isDrawing ? 'block' : 'none';

            // Pool
            document.getElementById('poolAmt').textContent = g.prizePool || 0;

            renderBoard();
            renderTickets();
            renderLeaderboard();
        }

        function renderBoard() {
            const g = state.game;
            const html = Array.from({ length: 90 }, (_, i) => {
                const num = i + 1;
                const drawn = g.drawnNumbers.includes(num);
                return `<div class="dot ${drawn ? 'drawn' : ''}">${num}</div>`;
            }).join('');
            document.getElementById('boardGrid').innerHTML = html;
        }

        function renderDrawnList() {
            const g = state.game;
            const recent = g.drawnNumbers.slice(-10).reverse();
            const html = recent.map(n => `<span class="drawn-num">${n}</span>`).join('');
            document.getElementById('drawnList').innerHTML = html || '<span style="color:#ccc;font-size:10px">None yet</span>';
        }

        function renderTickets() {
            const g = state.game;
            const myTickets = g.players[state.userId]?.tickets || [];

            const html = myTickets.map((t, idx) => {
                const marked = new Set(t.markedNumbers);
                const cells = t.grid.flat().map(n => {
                    if (n === 0) return '<div class="cell empty"></div>';

                    const isMarked = marked.has(n);
                    const isDrawn = g.drawnNumbers.includes(n);

                    let classes = 'cell';
                    if (isMarked) classes += ' marked';
                    // Add visual indicator for drawn numbers (optional - for visual feedback)
                    if (isDrawn) classes += ' drawn';

                    return `
                        <div class="${classes}" data-ticket="${t.id}" data-number="${n}" title="${isDrawn ? 'Drawn' : 'Not drawn yet'}">
                            ${n}
                        </div>
                    `;
                }).join('');

                const prizes = getPrizes(t, g);
                const prizeHtml = prizes.map(p => {
                    const claimed = g.prizes[p.type] !== undefined;
                    return `
                        <button class="prize-btn" ${claimed ? 'disabled' : ''} data-ticket="${t.id}" data-prize="${p.type}" title="${p.type}">
                            ${p.icon}
                        </button>
                    `;
                }).join('') || 'No prizes';

                return `
                    <div class="ticket mine">
                        <div class="ticket-header">
                            <span>${state.username}</span>
                            <span>Ticket ${idx + 1}</span>
                        </div>
                        <div class="prize-btns">${prizeHtml}</div>
                        <div class="ticket-grid">${cells}</div>
                        <div class="ticket-info">Marked: ${marked.size}/15</div>
                    </div>
                `;
            }).join('');

            document.getElementById('ticketsGrid').innerHTML = html || '<div class="empty-msg">No tickets</div>';

            // Attach event listeners
            document.querySelectorAll('.cell:not(.empty)').forEach(cell => {
                cell.addEventListener('click', function() {
                    const ticketId = this.dataset.ticket;
                    const number = parseInt(this.dataset.number);
                    // Toggle mark on/off
                    toggleMark(ticketId, number);
                });
            });

            document.querySelectorAll('.prize-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const ticketId = this.dataset.ticket;
                    const prizeType = this.dataset.prize;
                    if (this.disabled) return;
                    claimPrize(ticketId, prizeType);
                });
            });
        }

        function getPrizes(ticket, game) {
            const marked = new Set(ticket.markedNumbers);
            const prizes = [];

            if (marked.size >= 5 && !game.prizes['Jaldhi 5']) {
                prizes.push({ type: 'Jaldhi 5', icon: '5️⃣' });
            }

            if (!game.prizes['Top Line']) {
                const top = ticket.grid[0].filter(n => n !== 0);
                if (top.every(n => marked.has(n))) prizes.push({ type: 'Top Line', icon: '⬆️' });
            }

            if (!game.prizes['Middle Line']) {
                const mid = ticket.grid[1].filter(n => n !== 0);
                if (mid.every(n => marked.has(n))) prizes.push({ type: 'Middle Line', icon: '➡️' });
            }

            if (!game.prizes['Bottom Line']) {
                const bot = ticket.grid[2].filter(n => n !== 0);
                if (bot.every(n => marked.has(n))) prizes.push({ type: 'Bottom Line', icon: '⬇️' });
            }

            if (!game.prizes['Full Housie']) {
                const all = ticket.grid.flat().filter(n => n !== 0);
                if (all.every(n => marked.has(n))) prizes.push({ type: 'Full Housie', icon: '🏆' });
            }

            return prizes;
        }

        function renderLeaderboard() {
            const g = state.game;
            const lb = g.leaderboard || [];

            if (lb.length === 0) {
                document.getElementById('leaderboardList').innerHTML = '';
                document.getElementById('emptyBoard').style.display = 'block';
                return;
            }

            document.getElementById('emptyBoard').style.display = 'none';

            const html = lb.map(entry => {
                const prizeHtml = entry.prizes.map(p =>
                    `<div class="prize-item">${p.icon} ${p.type}: ₹${p.amount}</div>`
                ).join('');

                return `
                    <div class="winner-card">
                        <div class="winner-name">🎯 ${entry.playerName}</div>
                        <div class="winner-prizes">${prizeHtml}</div>
                        <div class="winner-total">Total: ₹${entry.totalWinnings}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('leaderboardList').innerHTML = html;
        }

        function toggleMark(ticketId, num) {
            if (!state.game) return;

            // Local optimistic update - toggle mark
            const ticket = state.game.players[state.userId]?.tickets?.find(t => t.id === ticketId);
            if (!ticket) return;

            const idx = ticket.markedNumbers.indexOf(num);
            if (idx >= 0) {
                // Already marked, unmark it
                ticket.markedNumbers.splice(idx, 1);
            } else {
                // Not marked, mark it
                ticket.markedNumbers.push(num);
            }

            // Render immediately for user feedback
            renderTickets();

            // Send to server (for tracking, validation happens on claim)
            state.ws.send(JSON.stringify({
                type: 'MARK_NUMBER',
                gameId: state.gameId,
                userId: state.userId,
                ticketId,
                number: num
            }));
        }

        function claimPrize(ticketId, prizeType) {
            state.ws.send(JSON.stringify({
                type: 'CLAIM_PRIZE',
                gameId: state.gameId,
                userId: state.userId,
                ticketId,
                prizeType
            }));
        }

        function startGame() {
            state.ws.send(JSON.stringify({ type: 'START_GAME', gameId: state.gameId, userId: state.userId }));
        }

        function resumeGame() {
            state.ws.send(JSON.stringify({ type: 'RESUME_DRAWING', gameId: state.gameId, userId: state.userId }));
        }

        function endGame() {
            if (!confirm('End game?')) return;
            state.ws.send(JSON.stringify({ type: 'END_GAME', gameId: state.gameId, userId: state.userId }));
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        init();
    </script>
</body>
</html>
