<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambola Game - CloseHousie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-left h1 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .header-info {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #764ba2;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Main layout */
        .main-layout {
            display: grid;
            grid-template-columns: 180px 1fr 200px;
            gap: 12px;
        }

        /* Left panel - Number board */
        .board-panel {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .board-panel h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            margin-bottom: 12px;
        }

        .board-dot {
            width: 100%;
            aspect-ratio: 1;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        .board-dot.drawn {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .drawn-list {
            border-top: 1px solid #eee;
            padding-top: 8px;
            font-size: 11px;
            color: #666;
        }

        .drawn-list h4 {
            font-size: 12px;
            margin-bottom: 4px;
            color: #333;
        }

        .drawn-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .drawn-number {
            background: #667eea;
            color: white;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        /* Center panel - Tickets */
        .tickets-panel {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .tickets-panel h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .ticket {
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            position: relative;
        }

        .ticket.mine {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        .ticket-player {
            font-size: 11px;
            font-weight: 600;
            color: #333;
        }

        .ticket-num {
            font-size: 10px;
            color: #999;
        }

        .prize-icons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .prize-btn {
            font-size: 16px;
            padding: 4px 6px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prize-btn:hover {
            background: #f0f0f0;
            transform: scale(1.1);
        }

        .prize-btn.claimed {
            background: #d4edda;
            border-color: #28a745;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            margin-bottom: 8px;
        }

        .ticket-cell {
            aspect-ratio: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 28px;
        }

        .ticket-cell.empty {
            background: #f5f5f5;
            cursor: default;
            border-style: dashed;
        }

        .ticket-cell.marked {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .ticket-cell:hover:not(.empty):not(.marked) {
            background: #e8eef9;
            border-color: #667eea;
        }

        .ticket-cell.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .ticket-footer {
            font-size: 10px;
            color: #999;
            text-align: right;
        }

        /* Right panel - Leaderboard */
        .leaderboard-panel {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .leaderboard-panel h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
        }

        .leaderboard-entry {
            background: #f9f9f9;
            border-left: 3px solid #667eea;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .entry-player {
            font-weight: 600;
            color: #333;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .entry-prizes {
            font-size: 10px;
            color: #666;
            line-height: 1.4;
        }

        .entry-prize-item {
            margin-bottom: 2px;
        }

        .entry-total {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #ddd;
            font-weight: 600;
            color: #28a745;
            font-size: 11px;
        }

        .pool-info {
            background: #f0f4ff;
            border: 1px solid #667eea;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .pool-amount {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin: 4px 0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .modal h2 {
            color: #667eea;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 150px 1fr 150px;
                gap: 8px;
            }
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .board-panel, .leaderboard-panel {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🎮 CloseHousie Tambola</h1>
                <div class="header-info">
                    <span>Code: <strong id="gameCode">-</strong></span>
                    <span>Players: <strong id="playerCount">0/5</strong></span>
                    <span>Status: <strong id="gameStatus">WAITING</strong></span>
                </div>
            </div>
            <div class="header-actions">
                <button id="startBtn" class="btn btn-primary" style="display: none;">▶️ Start</button>
                <button id="resumeBtn" class="btn btn-primary" style="display: none;">⏯️ Resume</button>
                <button id="endBtn" class="btn btn-danger" style="display: none;">⏹️ End Game</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Left: Board -->
            <div class="board-panel">
                <h3>🎲 Board (1-90)</h3>
                <div class="board-grid" id="boardGrid"></div>
                <div class="drawn-list">
                    <h4>Drawn Numbers</h4>
                    <div class="drawn-numbers" id="drawnList"></div>
                </div>
            </div>

            <!-- Center: Tickets -->
            <div class="tickets-panel">
                <h3>🎫 Your Tickets</h3>
                <div class="tickets-grid" id="ticketsContainer"></div>
            </div>

            <!-- Right: Leaderboard -->
            <div class="leaderboard-panel">
                <h3>🏆 Leaderboard</h3>
                <div class="pool-info">
                    <div>Prize Pool</div>
                    <div class="pool-amount">₹<span id="poolAmount">0</span></div>
                </div>
                <div id="leaderboard"></div>
                <div id="noLeaderboard" style="text-align: center; color: #999; font-size: 12px;">
                    No winners yet
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="gameListModal" class="modal active">
        <div class="modal-content">
            <h2>🎮 Tambola Games</h2>
            <div id="gamesList" style="max-height: 400px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="openCreateGameModal()">➕ Create Game</button>
            </div>
        </div>
    </div>

    <div id="createGameModal" class="modal">
        <div class="modal-content">
            <h2>Create Game</h2>
            <div class="form-group">
                <label>Ticket Count</label>
                <input type="number" id="createTickets" value="2" min="1" max="6">
            </div>
            <div class="form-group">
                <label>Ticket Price (₹)</label>
                <input type="number" id="createPrice" value="100" min="10">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeCreateGameModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createGame()">Create</button>
            </div>
        </div>
    </div>

    <div id="joinGameModal" class="modal">
        <div class="modal-content">
            <h2>Join Game</h2>
            <div class="form-group">
                <label>Ticket Count</label>
                <input type="number" id="joinTickets" value="1" min="1" max="6">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeJoinGameModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmJoinGame()">Join</button>
            </div>
        </div>
    </div>

    <script>
        let gameState = {
            gameId: null,
            userId: null,
            username: null,
            isHost: false,
            currentGame: null,
            myTickets: [],
            allTickets: {}
        };

        let ws = null;

        // Initialize
        function init() {
            const stored = localStorage.getItem('user');
            if (!stored) {
                window.location.href = '/';
                return;
            }

            const user = JSON.parse(stored);
            gameState.userId = user.userId;
            gameState.username = user.username;

            const gameId = new URLSearchParams(window.location.search).get('gameId');
            if (gameId) {
                gameState.gameId = gameId;
                connectToGame();
            } else {
                loadGamesList();
            }
        }

        // Load games list
        async function loadGamesList() {
            try {
                const res = await fetch('/api/games');
                const games = await res.json();

                let html = '';
                if (games.length === 0) {
                    html = '<div style="text-align: center; color: #999; padding: 20px;">No active games</div>';
                } else {
                    games.forEach(game => {
                        const playerCount = Object.keys(game.players || {}).length;
                        const isJoined = game.players && game.players[gameState.userId];
                        html += `
                            <div style="padding: 10px; background: #f9f9f9; margin-bottom: 8px; border-radius: 4px;">
                                <div style="font-weight: 600; color: #333; margin-bottom: 4px;">
                                    ${game.hostName}'s Game - ₹${game.ticketPrice}/ticket
                                </div>
                                <div style="font-size: 11px; color: #666; margin-bottom: 6px;">
                                    Code: <strong>${game.joinCode}</strong> | Players: ${playerCount}/5 | Status: ${game.status}
                                </div>
                                <button class="btn btn-primary" style="width: 100%; font-size: 11px; padding: 6px;"
                                    onclick="openJoinModal('${game.id}', ${game.ticketPrice})">
                                    ${isJoined ? '👁️ View Game' : '➕ Join Game'}
                                </button>
                            </div>
                        `;
                    });
                }

                document.getElementById('gamesList').innerHTML = html;
            } catch (e) {
                console.error('Error loading games:', e);
            }
        }

        // Game modals
        function openCreateGameModal() {
            document.getElementById('gameListModal').classList.remove('active');
            document.getElementById('createGameModal').classList.add('active');
        }

        function closeCreateGameModal() {
            document.getElementById('createGameModal').classList.remove('active');
            document.getElementById('gameListModal').classList.add('active');
        }

        async function createGame() {
            const ticketCount = parseInt(document.getElementById('createTickets').value);
            const ticketPrice = parseInt(document.getElementById('createPrice').value);

            try {
                const res = await fetch('/api/games/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: gameState.userId,
                        username: gameState.username,
                        ticketCount,
                        ticketPrice
                    })
                });

                const result = await res.json();
                gameState.gameId = result.game.id;
                gameState.isHost = true;
                connectToGame();
            } catch (e) {
                alert('Error creating game: ' + e.message);
            }
        }

        let targetGameId = null;

        function openJoinModal(gameId, price) {
            targetGameId = gameId;
            document.getElementById('joinGameModal').classList.add('active');
        }

        function closeJoinGameModal() {
            document.getElementById('joinGameModal').classList.remove('active');
        }

        async function confirmJoinGame() {
            const ticketCount = parseInt(document.getElementById('joinTickets').value);

            try {
                const res = await fetch('/api/games/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        gameId: targetGameId,
                        userId: gameState.userId,
                        username: gameState.username,
                        ticketCount
                    })
                });

                if (!res.ok) {
                    const error = await res.json();
                    alert('Error: ' + error.error);
                    return;
                }

                gameState.gameId = targetGameId;
                closeJoinGameModal();
                connectToGame();
            } catch (e) {
                alert('Error joining game: ' + e.message);
            }
        }

        // Connect to game via WebSocket
        function connectToGame() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                console.log('Connected to game');
                ws.send(JSON.stringify({
                    type: 'JOIN_GAME',
                    gameId: gameState.gameId,
                    userId: gameState.userId
                }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('Disconnected from game');
            };
        }

        // Handle WebSocket messages
        function handleMessage(msg) {
            switch (msg.type) {
                case 'GAME_STATE':
                    gameState.currentGame = msg.game;
                    renderGame();
                    break;

                case 'PLAYER_JOINED':
                    gameState.currentGame.players = msg.game?.players || gameState.currentGame.players;
                    renderGame();
                    break;

                case 'GAME_STARTED':
                    gameState.currentGame = msg.game;
                    renderGame();
                    break;

                case 'NUMBER_DRAWN':
                    gameState.currentGame.drawnNumbers = msg.drawnNumbers || gameState.currentGame.drawnNumbers;
                    gameState.currentGame.drawnNumberSequence = msg.sequence;
                    renderBoard();
                    renderDrawnList();
                    break;

                case 'PRIZE_CLAIMED':
                    gameState.currentGame.prizes = msg.prizes;
                    gameState.currentGame.leaderboard = msg.leaderboard;
                    gameState.currentGame.isDrawing = false;
                    renderGame();
                    break;

                case 'DRAWING_RESUMED':
                    gameState.currentGame = msg.game;
                    renderGame();
                    break;

                case 'GAME_ENDED':
                    localStorage.removeItem('currentGame');
                    setTimeout(() => {
                        window.location.href = '/game';
                    }, 2000);
                    break;
            }
        }

        // Render game UI
        function renderGame() {
            const game = gameState.currentGame;
            if (!game) return;

            // Update header
            document.getElementById('gameCode').textContent = game.joinCode;
            document.getElementById('playerCount').textContent = `${Object.keys(game.players || {}).length}/5`;
            document.getElementById('gameStatus').textContent = game.status;
            document.getElementById('poolAmount').textContent = game.prizePool || 0;

            // Update buttons visibility
            gameState.isHost = game.hostId === gameState.userId;
            document.getElementById('startBtn').style.display = gameState.isHost && game.status === 'WAITING' ? 'block' : 'none';
            document.getElementById('endBtn').style.display = gameState.isHost && game.status === 'IN_PROGRESS' ? 'block' : 'none';
            document.getElementById('resumeBtn').style.display = gameState.isHost && game.status === 'IN_PROGRESS' && !game.isDrawing ? 'block' : 'none';

            // Hide game list modal
            document.getElementById('gameListModal').classList.remove('active');

            // Render board and tickets
            renderBoard();
            renderTickets();
            renderLeaderboard();
        }

        function renderBoard() {
            const game = gameState.currentGame;
            const boardHTML = Array.from({ length: 90 }, (_, i) => {
                const num = i + 1;
                const isDrawn = game.drawnNumbers.includes(num);
                return `
                    <div class="board-dot ${isDrawn ? 'drawn' : ''}">
                        ${num}
                    </div>
                `;
            }).join('');

            document.getElementById('boardGrid').innerHTML = boardHTML;
        }

        function renderDrawnList() {
            const game = gameState.currentGame;
            const recent = game.drawnNumbers.slice(-10).reverse();
            const html = recent.map(n => `<span class="drawn-number">${n}</span>`).join('');
            document.getElementById('drawnList').innerHTML = html;
        }

        function renderTickets() {
            const game = gameState.currentGame;
            const myTickets = game.players[gameState.userId]?.tickets || [];

            const html = myTickets.map((ticket, idx) => {
                const markedSet = new Set(ticket.markedNumbers || []);
                const grid = ticket.grid || [];

                const cellsHTML = grid.flat().map((num, cellIdx) => {
                    if (num === 0) {
                        return '<div class="ticket-cell empty"></div>';
                    }
                    const isMarked = markedSet.has(num);
                    const canMark = game.status === 'WAITING' || (game.status === 'IN_PROGRESS' && game.drawnNumbers.includes(num));
                    const disabled = game.status === 'IN_PROGRESS' && !game.drawnNumbers.includes(num);

                    return `
                        <div class="ticket-cell ${isMarked ? 'marked' : ''} ${disabled ? 'disabled' : ''}"
                            onclick="${canMark && !isMarked && game.status === 'IN_PROGRESS' ? `markNumber('${ticket.id}', ${num})` : ''}">
                            ${num}
                        </div>
                    `;
                }).join('');

                // Get available prizes for this ticket
                const prizes = detectAvailablePrizes(ticket, game);
                const prizeHTML = prizes.map(p => {
                    const isClaimed = game.prizes[p.type] !== undefined;
                    return `
                        <button class="prize-btn ${isClaimed ? 'claimed' : ''}"
                            ${isClaimed ? 'disabled' : `onclick="claimPrize('${ticket.id}', '${p.type}')`"}
                            title="${p.type}">
                            ${p.icon}
                        </button>
                    `;
                }).join('');

                return `
                    <div class="ticket mine">
                        <div class="ticket-header">
                            <span class="ticket-player">${gameState.username}</span>
                            <span class="ticket-num">Ticket ${idx + 1}</span>
                        </div>
                        <div class="prize-icons">${prizeHTML || 'No prizes'}</div>
                        <div class="ticket-grid">${cellsHTML}</div>
                        <div class="ticket-footer">
                            Marked: ${markedSet.size}/15
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('ticketsContainer').innerHTML = html || '<div style="text-align: center; color: #999;">No tickets</div>';
        }

        function detectAvailablePrizes(ticket, game) {
            const markedSet = new Set(ticket.markedNumbers || []);
            const prizes = [];

            // Jaldhi 5
            if (markedSet.size >= 5 && !game.prizes['Jaldhi 5']) {
                prizes.push({ type: 'Jaldhi 5', icon: '5️⃣' });
            }

            // Lines
            if (!game.prizes['Top Line']) {
                const topLine = ticket.grid[0].filter(n => n !== 0);
                if (topLine.every(n => markedSet.has(n))) {
                    prizes.push({ type: 'Top Line', icon: '⬆️' });
                }
            }

            if (!game.prizes['Middle Line']) {
                const midLine = ticket.grid[1].filter(n => n !== 0);
                if (midLine.every(n => markedSet.has(n))) {
                    prizes.push({ type: 'Middle Line', icon: '➡️' });
                }
            }

            if (!game.prizes['Bottom Line']) {
                const botLine = ticket.grid[2].filter(n => n !== 0);
                if (botLine.every(n => markedSet.has(n))) {
                    prizes.push({ type: 'Bottom Line', icon: '⬇️' });
                }
            }

            // Full Housie
            if (!game.prizes['Full Housie']) {
                const allNums = ticket.grid.flat().filter(n => n !== 0);
                if (allNums.every(n => markedSet.has(n))) {
                    prizes.push({ type: 'Full Housie', icon: '🏆' });
                }
            }

            return prizes;
        }

        function renderLeaderboard() {
            const game = gameState.currentGame;
            const leaderboard = game.leaderboard || [];

            if (leaderboard.length === 0) {
                document.getElementById('leaderboard').innerHTML = '';
                document.getElementById('noLeaderboard').style.display = 'block';
                return;
            }

            document.getElementById('noLeaderboard').style.display = 'none';
            const html = leaderboard.map(entry => {
                const prizesHTML = entry.prizes.map(p =>
                    `<div class="entry-prize-item">${p.icon} ${p.type}: ₹${p.amount}</div>`
                ).join('');

                return `
                    <div class="leaderboard-entry">
                        <div class="entry-player">🎯 ${entry.playerName}</div>
                        <div class="entry-prizes">${prizesHTML}</div>
                        <div class="entry-total">Total: ₹${entry.totalWinnings}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('leaderboard').innerHTML = html;
        }

        // Actions
        function markNumber(ticketId, number) {
            if (gameState.currentGame.status !== 'IN_PROGRESS') return;
            if (!gameState.currentGame.drawnNumbers.includes(number)) return;

            ws.send(JSON.stringify({
                type: 'MARK_NUMBER',
                gameId: gameState.gameId,
                userId: gameState.userId,
                ticketId,
                number
            }));

            // Mark locally immediately
            const ticket = gameState.currentGame.players[gameState.userId].tickets.find(t => t.id === ticketId);
            if (ticket && !ticket.markedNumbers.includes(number)) {
                ticket.markedNumbers.push(number);
                renderTickets();
            }
        }

        function claimPrize(ticketId, prizeType) {
            ws.send(JSON.stringify({
                type: 'CLAIM_WIN',
                gameId: gameState.gameId,
                userId: gameState.userId,
                ticketId,
                prizeType
            }));
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({
                type: 'START_GAME',
                gameId: gameState.gameId,
                userId: gameState.userId
            }));
        });

        document.getElementById('resumeBtn').addEventListener('click', () => {
            ws.send(JSON.stringify({
                type: 'RESUME_DRAWING',
                gameId: gameState.gameId,
                userId: gameState.userId
            }));
        });

        document.getElementById('endBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to end this game?')) {
                ws.send(JSON.stringify({
                    type: 'END_GAME',
                    gameId: gameState.gameId,
                    userId: gameState.userId
                }));
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('user');
            localStorage.removeItem('currentGame');
            window.location.href = '/';
        });

        // Start
        init();
    </script>
</body>
</html>
